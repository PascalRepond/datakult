name: CI

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.14

      - name: Set up Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: src/theme/static_src/package-lock.json


      - name: Install Python dependencies
        run: uv sync --frozen --dev --no-group prod

      - name: Install Node.js dependencies
        run: npm ci
        working-directory: src/theme/static_src

      - name: Run CI checks
        run: uv run poe ci

  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --frozen --dev --no-group prod

      - name: Validate release configuration
        run: |
          echo "📋 Checking what release would be created..."
          echo ""

          # Run in noop mode to see what would happen without making changes
          uv run semantic-release --noop version || {
            echo "ℹ️  No release would be created (no releasable commits since last release)"
            exit 0
          }

          echo ""
          echo "✅ Release configuration is valid!"
